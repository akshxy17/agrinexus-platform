# This is the JDBC connection URL for the MySQL database.
spring.datasource.url=jdbc:mysql://localhost:3306/farmermgmt

# Username for the database connection.
spring.datasource.username=root

# Password for the database connection.
spring.datasource.password=root

#Automatically updates the database schema whenever entity classes change.
spring.jpa.hibernate.ddl-auto=update

# Show the SQL statements being executed in the console.
### spring.jpa.show-sql=true

# Root level log
logging.level.root=INFO

# Only DEBUG for your package
logging.level.com.farmer.management=DEBUG

# Save logs into a file
logging.file.name=logs/farmer-mgmt.log

# Spring Security settings
spring.security.user.name=admin
spring.security.user.password=admin

# Set logging level for Spring Security to WARN to reduce verbosity(extra words that are not needed)
# logging.level.org.springframework.security.web.DefaultSecurityFilterChain=WARN

# Actuator settings
management.endpoints.web.exposure.include=health,info,metrics
